<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#09090f; --surface:#0f0f1c; --card:#121220; --border:#1c1c2e;
    --accent:#00f5a0; --blue:#00c8ff; --red:#ff6b6b; --yellow:#ffd700;
    --text:#dcdcf0; --muted:#5a5a7a;
    --mono:'Courier New', monospace; --sans:'Segoe UI', sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }
  header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:1.2rem 2rem; display:flex; align-items:center; justify-content:space-between;
  }
  header h1 { font-family:var(--mono); font-size:0.9rem; color:var(--accent); }
  .task-count { font-family:var(--mono); font-size:0.7rem; color:var(--muted); }
  main { max-width:580px; margin:0 auto; padding:2rem 1.5rem; }

  /* ADD FORM */
  .add-form { display:flex; gap:0.6rem; margin-bottom:1.5rem; }
  .add-input {
    flex:1; padding:0.75rem 1rem;
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:0.82rem;
    outline:none; transition:border-color 0.2s;
  }
  .add-input:focus { border-color:var(--accent); }
  .add-input::placeholder { color:var(--muted); }
  .add-btn {
    padding:0.75rem 1.2rem; background:var(--accent); border:none;
    color:#09090f; font-family:var(--mono); font-size:0.82rem;
    font-weight:700; cursor:pointer; transition:transform 0.15s;
  }
  .add-btn:hover { transform:translateY(-1px); }

  /* CATEGORY SELECTOR */
  .category-row { display:flex; gap:0.5rem; margin-bottom:1.2rem; flex-wrap:wrap; }
  .cat-btn {
    padding:0.35rem 0.85rem; font-family:var(--mono); font-size:0.65rem;
    background:transparent; border:1px solid var(--border);
    color:var(--muted); cursor:pointer; letter-spacing:0.08em;
    transition:all 0.2s;
  }
  .cat-btn:hover, .cat-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,245,160,0.06); }

  /* STATS */
  .stats-row {
    display:flex; gap:1rem; margin-bottom:1.5rem;
    background:var(--surface); border:1px solid var(--border);
    padding:0.8rem 1rem; flex-wrap:wrap;
  }
  .stat { font-family:var(--mono); font-size:0.68rem; color:var(--muted); }
  .stat span { color:var(--accent); font-size:0.9rem; }

  /* FILTER TABS */
  .filters { display:flex; gap:0; margin-bottom:1rem; border:1px solid var(--border); }
  .filter-btn {
    flex:1; padding:0.5rem; font-family:var(--mono); font-size:0.68rem;
    background:transparent; border:none; border-right:1px solid var(--border);
    color:var(--muted); cursor:pointer; letter-spacing:0.08em; transition:all 0.2s;
  }
  .filter-btn:last-child { border-right:none; }
  .filter-btn.active { color:var(--bg); background:var(--accent); }
  .filter-btn:hover:not(.active) { color:var(--text); background:rgba(255,255,255,0.03); }

  /* TASK LIST */
  #taskList { list-style:none; display:flex; flex-direction:column; gap:0.5rem; }
  .task-item {
    display:flex; align-items:center; gap:0.8rem;
    background:var(--card); border:1px solid var(--border);
    padding:0.9rem 1rem;
    animation:slideIn 0.25s ease;
    transition:opacity 0.2s, border-color 0.2s;
  }
  .task-item:hover { border-color:rgba(0,245,160,0.2); }
  .task-item.done { opacity:0.5; }
  .task-item.done .task-text { text-decoration:line-through; color:var(--muted); }
  @keyframes slideIn {
    from { opacity:0; transform:translateX(-12px); }
    to   { opacity:1; transform:translateX(0); }
  }
  .task-check {
    width:18px; height:18px; border:2px solid var(--border);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all 0.2s;
  }
  .task-check:hover { border-color:var(--accent); }
  .task-check.checked { background:var(--accent); border-color:var(--accent); }
  .task-check.checked::after { content:'✓'; font-size:0.7rem; color:#09090f; font-weight:900; }
  .task-text { flex:1; font-size:0.85rem; line-height:1.4; }
  .task-tag {
    font-family:var(--mono); font-size:0.58rem;
    padding:0.1rem 0.45rem; border-radius:2px; flex-shrink:0;
  }
  .tag-work  { background:rgba(0,200,255,0.1); color:var(--blue); border:1px solid rgba(0,200,255,0.2); }
  .tag-study { background:rgba(255,215,0,0.1); color:var(--yellow); border:1px solid rgba(255,215,0,0.2); }
  .tag-personal { background:rgba(0,245,160,0.1); color:var(--accent); border:1px solid rgba(0,245,160,0.2); }
  .task-delete {
    background:transparent; border:none; color:var(--muted);
    cursor:pointer; font-size:0.85rem; padding:0.2rem 0.4rem;
    transition:color 0.2s; flex-shrink:0;
  }
  .task-delete:hover { color:var(--red); }
  .empty-msg {
    text-align:center; padding:3rem 1rem;
    font-family:var(--mono); font-size:0.75rem; color:var(--muted);
    border:1px dashed var(--border); background:var(--surface);
  }
  .clear-btn {
    margin-top:1rem; width:100%;
    padding:0.5rem; font-family:var(--mono); font-size:0.68rem;
    background:transparent; border:1px solid var(--border);
    color:var(--muted); cursor:pointer; letter-spacing:0.08em;
    transition:all 0.2s;
  }
  .clear-btn:hover { border-color:var(--red); color:var(--red); }
</style>
</head>
<body>
<header>
  <h1>✓ To-Do App — MVC Pattern</h1>
  <div class="task-count" id="taskCount">0 tarefas</div>
</header>
<main>
  <div class="add-form">
    <input class="add-input" id="taskInput" placeholder="Nova tarefa... (Enter para adicionar)" type="text" onkeydown="if(event.key==='Enter') addTask()">
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>

  <div class="category-row">
    <span style="font-family:var(--mono);font-size:0.65rem;color:var(--muted);padding:0.35rem 0">Categoria:</span>
    <button class="cat-btn active" data-cat="personal" onclick="selectCat(this)">Personal</button>
    <button class="cat-btn" data-cat="work" onclick="selectCat(this)">Work</button>
    <button class="cat-btn" data-cat="study" onclick="selectCat(this)">Study</button>
  </div>

  <div class="stats-row">
    <div class="stat">Total: <span id="sTotal">0</span></div>
    <div class="stat">Pendentes: <span id="sPending">0</span></div>
    <div class="stat">Concluídas: <span id="sDone">0</span></div>
    <div class="stat">Progresso: <span id="sProgress">0%</span></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pendentes</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Concluídas</button>
  </div>

  <ul id="taskList"></ul>
  <button class="clear-btn" onclick="clearDone()">✕ Limpar tarefas concluídas</button>
</main>

<script>
class TodoApp {
  constructor() {
    this.tasks = JSON.parse(localStorage.getItem('gc-tasks') || '[]');
    this.filter = 'all';
    this.selectedCat = 'personal';
    this.render();
  }
  save() { localStorage.setItem('gc-tasks', JSON.stringify(this.tasks)); }
  add(text, cat) {
    this.tasks.push({ id: Date.now(), text, cat, done: false });
    this.save(); this.render();
  }
  toggle(id) {
    const t = this.tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; this.save(); this.render(); }
  }
  remove(id) {
    this.tasks = this.tasks.filter(t => t.id !== id);
    this.save(); this.render();
  }
  clearDone() {
    this.tasks = this.tasks.filter(t => !t.done);
    this.save(); this.render();
  }
  get filtered() {
    if (this.filter === 'pending') return this.tasks.filter(t => !t.done);
    if (this.filter === 'done')    return this.tasks.filter(t => t.done);
    return this.tasks;
  }
  render() {
    const list = document.getElementById('taskList');
    const items = this.filtered;
    if (!items.length) {
      list.innerHTML = `<li class="empty-msg">// Nenhuma tarefa encontrada<br>// Adicione uma acima ↑</li>`;
    } else {
      list.innerHTML = items.map(t => `
        <li class="task-item ${t.done ? 'done' : ''}">
          <div class="task-check ${t.done ? 'checked' : ''}" onclick="app.toggle(${t.id})"></div>
          <span class="task-text">${this.escape(t.text)}</span>
          <span class="task-tag tag-${t.cat}">${t.cat}</span>
          <button class="task-delete" onclick="app.remove(${t.id})">✕</button>
        </li>`).join('');
    }
    const total = this.tasks.length;
    const done  = this.tasks.filter(t => t.done).length;
    const pct   = total ? Math.round(done / total * 100) : 0;
    document.getElementById('sTotal').textContent    = total;
    document.getElementById('sPending').textContent  = total - done;
    document.getElementById('sDone').textContent     = done;
    document.getElementById('sProgress').textContent = pct + '%';
    document.getElementById('taskCount').textContent = total + ' tarefa' + (total !== 1 ? 's' : '');
  }
  escape(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
}

const app = new TodoApp();

// Add some demo tasks if empty
if (!app.tasks.length) {
  app.add('Estudar estruturas de dados', 'study');
  app.add('Praticar algoritmos de ordenação', 'study');
  app.add('Fazer portfolio pessoal', 'personal');
  app.add('Aprender sobre APIs REST', 'work');
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  app.add(text, app.selectedCat);
  input.value = '';
}
function setFilter(f, btn) {
  app.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  app.render();
}
function selectCat(btn) {
  app.selectedCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function clearDone() { app.clearDone(); }
</script>
</body>
</html>
